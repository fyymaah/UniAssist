<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Identification - UniAssist</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-customization">
            <button id="theme-toggle">⚙️ Settings</button>
        </div>
        <h1 class="main-title">UniAssist</h1>
    </header>
    
    <main>
        <!-- Image Upload Section -->
        <div class="tool-container">
            <h3>📷 Upload Image to Identify Color</h3>
            <input type="file" id="color-upload" accept="image/*">
            <div id="image-preview" class="image-preview"></div>
            <canvas id="color-canvas" width="300" height="300" style="display:none;"></canvas>
            <div class="color-result-card" id="upload-result-card" style="display: none;">
                <div class="color-preview" id="upload-color-preview"></div>
                <div class="color-details">
                    <p>Color Name: <strong id="color-result">None</strong></p>
                    <p>Hex Code: <strong id="color-hex">#000000</strong></p>
                    <p>RGB: <strong id="color-rgb">rgb(0,0,0)</strong></p>
                </div>
            </div>
        </div>

        <!-- Color Palette Section -->
        <div class="tool-container">
            <h3>🎨 Color Palette Selector</h3>
            <div class="color-palette" id="color-palette">
                <!-- Color swatches will be generated by JS -->
            </div>
            <div class="color-result-card" id="palette-result-card" style="display: none;">
                <div class="color-preview" id="palette-color-preview"></div>
                <div class="color-details">
                    <p>Color Name: <strong id="palette-result">None</strong></p>
                    <p>Hex Code: <strong id="palette-hex">#000000</strong></p>
                    <p>RGB: <strong id="palette-rgb">rgb(0,0,0)</strong></p>
                </div>
            </div>
        </div>

        <!-- Back Button -->
        <div style="margin-top: 30px;">
            <a href="index.html" class="feature-card" style="display: inline-block;">
                <div class="icon">🏠</div>
                <h3>Back to Home</h3>
            </a>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        // RGB to Hex conversion
        function rgbToHex(r, g, b) {
            return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();
        }

        // Update color display
        function updateColorDisplay(r, g, b, name, source) {
            const hex = rgbToHex(r, g, b);
            const rgb = `rgb(${r}, ${g}, ${b})`;
            
            if (source === 'upload') {
                document.getElementById('color-result').innerText = name;
                document.getElementById('color-hex').innerText = hex;
                document.getElementById('color-rgb').innerText = rgb;
                document.getElementById('upload-color-preview').style.backgroundColor = rgb;
                document.getElementById('upload-result-card').style.display = 'flex';
            } else {
                document.getElementById('palette-result').innerText = name;
                document.getElementById('palette-hex').innerText = hex;
                document.getElementById('palette-rgb').innerText = rgb;
                document.getElementById('palette-color-preview').style.backgroundColor = rgb;
                document.getElementById('palette-result-card').style.display = 'flex';
            }
            
            speakText(`The color is ${name}. Hex code ${hex}`);
        }

        // Generate Color Palette
        const colorPalette = [
            { r: 255, g: 0, b: 0, name: "Red" },
            { r: 0, g: 0, b: 255, name: "Blue" },
            { r: 0, g: 128, b: 0, name: "Green" },
            { r: 255, g: 255, b: 0, name: "Yellow" },
            { r: 255, g: 165, b: 0, name: "Orange" },
            { r: 128, g: 0, b: 128, name: "Purple" },
            { r: 255, g: 192, b: 203, name: "Pink" },
            { r: 165, g: 42, b: 42, name: "Brown" },
            { r: 0, g: 255, b: 255, name: "Cyan" },
            { r: 255, g: 0, b: 255, name: "Magenta" },
            { r: 128, g: 128, b: 128, name: "Gray" },
            { r: 0, g: 255, b: 0, name: "Lime" },
            { r: 0, g: 0, b: 128, name: "Navy" },
            { r: 0, g: 128, b: 128, name: "Teal" },
            { r: 128, g: 0, b: 0, name: "Maroon" },
            { r: 128, g: 128, b: 0, name: "Olive" },
            { r: 192, g: 192, b: 192, name: "Silver" },
            { r: 255, g: 255, b: 255, name: "White" },
            { r: 0, g: 0, b: 0, name: "Black" }
        ];

        // Generate Color Swatches
        const paletteContainer = document.getElementById('color-palette');
        colorPalette.forEach(color => {
            const swatch = document.createElement('div');
            swatch.className = 'color-swatch';
            swatch.style.backgroundColor = `rgb(${color.r}, ${color.g}, ${color.b})`;
            swatch.title = color.name;
            swatch.onclick = () => {
                updateColorDisplay(color.r, color.g, color.b, color.name, 'palette');
            };
            paletteContainer.appendChild(swatch);
        });

        // Image Upload Color Detection
        document.getElementById('color-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                // Show preview
                const preview = document.getElementById('image-preview');
                preview.innerHTML = '';
                const imgPreview = document.createElement('img');
                imgPreview.src = URL.createObjectURL(file);
                imgPreview.style.maxWidth = '100%';
                imgPreview.style.maxHeight = '200px';
                imgPreview.style.borderRadius = '8px';
                preview.appendChild(imgPreview);

                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.getElementById('color-canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = 300;
                        canvas.height = 300;
                        ctx.drawImage(img, 0, 0, 300, 300);
                        
                        // Get color from center of image
                        const pixel = ctx.getImageData(150, 150, 1, 1).data;
                        const colorName = getColorName(pixel[0], pixel[1], pixel[2]);
                        updateColorDisplay(pixel[0], pixel[1], pixel[2], colorName, 'upload');
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
